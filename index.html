<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanhue Hospital System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #001f3f; color: white; }
        .slide { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; width: 100%; max-width: 480px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #00d4ff; color: #001f3f; font-weight: bold; cursor: pointer; }
        .summary-box { background: #f0f7ff; color: #333; padding: 15px; border-radius: 8px; margin: 15px 0; border-left: 5px solid #00d4ff; }
        
        /* Dashboard Table Styles */
        table { width: 100%; border-collapse: collapse; background: white; color: #333; font-size: 12px; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #00d4ff; color: #001f3f; }
    </style>
</head>
<body>

    <div id="step1" class="slide active">
        <div class="card">
            <h2>Hospital Registration</h2>
            <input type="text" id="pName" placeholder="Patient Full Name">
            <select id="pGender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
            <input type="tel" id="pMobile" placeholder="10-digit Mobile">
            <button onclick="assignAppointment()">Register & Generate MRN</button>
            <button onclick="showSlide('admin')" style="background:#333; color:#ccc; font-size:12px; margin-top:40px;">Open Supervisor Dashboard</button>
        </div>
    </div>

    <div id="step2" class="slide">
        <div class="card">
            <h2>Trainee Entry</h2>
            <div class="summary-box">
                <strong>MRN:</strong> <span id="regMRN" style="color:red; font-weight:bold;"></span><br>
                <span id="apptInfo" style="font-weight:bold;"></span>
            </div>
            <textarea id="pSymptoms" placeholder="Symptoms..."></textarea>
            <input type="text" id="pBP" placeholder="Blood Pressure (BP)">
            <button onclick="showSlide('step3')">Send to Doctor</button>
        </div>
    </div>

    <div id="step3" class="slide">
        <div class="card">
            <h2>Doctor Consultation</h2>
            <textarea id="docFindings" placeholder="Doctor's Findings"></textarea>
            <textarea id="docMeds" placeholder="Prescribed Medications"></textarea>
            <button onclick="completeDocSession()">Send to Pharmacy</button>
        </div>
    </div>

    <div id="step4" class="slide">
        <div class="card">
            <h2>Pharmacy Portal</h2>
            <div class="summary-box" id="pharmaReview"></div>
            <button onclick="alert('Dispensed Successfully!'); location.reload();">Confirm Release</button>
        </div>
    </div>

    <div id="admin" class="slide">
        <h2 style="color:white;">Supervisor View</h2>
        <div style="width:100%; max-width:900px; overflow-x:auto;">
            <table id="logTable">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>MRN</th>
                        <th>Patient Name</th>
                        <th>Assigned Doctor</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    </tbody>
            </table>
        </div>
        <button onclick="showSlide('step1')" style="max-width:200px; margin-top:20px;">Back to Registration</button>
    </div>

    <script>
        const doctors = ["Dr. Aryan", "Dr. Bhavna", "Dr. Chitra", "Dr. David", "Dr. Esha", "Dr. Farhan", "Dr. Gita", "Dr. Harsh", "Dr. Ishita", "Dr. Jatin"];
        let patientLog = []; // Stores the day's records
        const startTime = new Date();
        startTime.setHours(9, 0, 0);

        function showSlide(id) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'admin') updateDashboard();
        }

        function assignAppointment() {
            const name = document.getElementById('pName').value;
            if(!name) return alert("Enter Name");

            const mrn = "2026" + Math.floor(100000 + Math.random() * 900000);
            const docIdx = patientLog.length % 10;
            const roundNum = Math.floor(patientLog.length / 10);
            const apptTime = new Date(startTime.getTime() + (roundNum * 5 * 60000)).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Save to Log
            patientLog.push({ time: apptTime, mrn: mrn, name: name, doc: doctors[docIdx], status: "With Trainee" });

            document.getElementById('regMRN').innerText = mrn;
            document.getElementById('apptInfo').innerText = "Assigned: " + doctors[docIdx] + " @ " + apptTime;
            showSlide('step2');
        }

        function completeDocSession() {
            const currentMRN = document.getElementById('regMRN').innerText;
            const meds = document.getElementById('docMeds').value;
            
            // Update Log
            let record = patientLog.find(r => r.mrn === currentMRN);
            if(record) record.status = "Ready at Pharmacy";

            document.getElementById('pharmaReview').innerText = "Medications: " + meds;
            showSlide('step4');
        }

        function updateDashboard() {
            const body = document.getElementById('logBody');
            body.innerHTML = '';
            patientLog.forEach(row => {
                body.innerHTML += `<tr>
                    <td>${row.time}</td>
                    <td>${row.mrn}</td>
                    <td>${row.name}</td>
                    <td>${row.doc}</td>
                    <td><strong>${row.status}</strong></td>
                </tr>`;
            });
        }
    </script>
</body>
</html>
