<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanhue Hospital</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* PPT Slide Theme */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #001f3f; color: white; overflow: hidden; }
        .slide { 
            height: 100vh; width: 100vw; 
            display: none; flex-direction: column; 
            justify-content: center; align-items: center; 
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        .active { display: flex; } /* Shows the current "slide" */

        /* Visual Elements */
        .logo-img { width: 120px; margin-bottom: 20px; border-radius: 20px; }
        .card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; }
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { background-color: #00d4ff; color: #001f3f; font-weight: bold; cursor: pointer; }
        .secondary-btn { background-color: #555; color: white; margin-top: 10px; }
        
        .token-val { font-size: 50px; color: #00ff88; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="slide1" class="slide active">
        <img src="icon.png" class="logo-img" alt="Vanhue Logo">
        <h1>Vanhue Technologies</h1>
        <p>Smart Hospital Portal</p>
        <button onclick="nextSlide('slide1', 'slide2')">Start Registration</button>
    </div>

    <div id="slide2" class="slide">
        <div class="card">
            <h2>Patient Details</h2>
            <input type="text" id="pName" placeholder="Full Name">
            <input type="tel" id="pPhone" placeholder="Mobile Number">
            <select id="pSymptom">
                <option value="General">General Checkup</option>
                <option value="Emergency">Emergency</option>
                <option value="Pediatrics">Child Care</option>
            </select>
            <button onclick="generateToken()">Generate Token</button>
            <button class="secondary-btn" onclick="nextSlide('slide2', 'slide1')">Back</button>
        </div>
    </div>

    <div id="slide3" class="slide">
        <div class="card">
            <h2 style="color: #00ff88;">Confirmed!</h2>
            <p>Your Token Number:</p>
            <div class="token-val" id="tokenDisplay">VT-000</div>
            <p id="docDisplay" style="font-weight: bold;">Dr. Sharma - Room 101</p>
            <button onclick="window.print()">Print Slip</button>
            <button class="secondary-btn" onclick="location.reload()">New Patient</button>
        </div>
    </div>

    <script>
        function nextSlide(current, next) {
            document.getElementById(current).classList.remove('active');
            document.getElementById(next).classList.add('active');
        }

        function generateToken() {
            const name = document.getElementById('pName').value;
            if(!name) { alert("Please enter a name"); return; }
            
            const token = "VT-" + Math.floor(100 + Math.random() * 900);
            document.getElementById('tokenDisplay').innerText = token;
            nextSlide('slide2', 'slide3');
        }
    </script>
</body>
</html>
